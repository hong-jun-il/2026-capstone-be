services:
  postgres:
    image: postgres:14
    container_name: moduBot-db
    restart: always
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    env_file:
      - .env.prod
  qdrant:
    image: qdrant/qdrant:latest
    container_name: modu-bot-qdrant
    restart: always
    ports:
      - '8001:6333'
      - '6334:6334'
    volumes:
      - ./qdrant_storage:/qdrant/storage:z

  backend:
    image: woojo230/modu-bot-be:latest
    container_name: modu-bot-backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    env_file:
      - .env.prod
    depends_on:
      - postgres

  ai:
    image: woojo230/modu-bot-ai:latest
    container_name: modu-bot-ai
    restart: always
    # ports:
    #   - '8000:8000'
    env_file:
      - .env.prod
