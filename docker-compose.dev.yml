services:
  postgres:
    image: postgres:14
    container_name: moduBot-db
    restart: always
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file:
      - .env.local
  qdrant:
    image: qdrant/qdrant:latest
    container_name: modu-bot-qdrant
    restart: always
    ports:
      - "8001:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
