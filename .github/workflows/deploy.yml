name: CI/CD Deployment

on:
  push:
    branches: ['main']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./modu-bot-be
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/modu-bot-be:latest

      - name: Build and Push AI Image
        uses: docker/build-push-action@v5
        with:
          context: ./modu-bot-ai
          file: ./modu-bot-ai/dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/modu-bot-ai:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/project # 프로젝트 경로 (EC2에 미리 폴더가 있어야 함)
            docker-compose pull
            docker-compose up -d
            docker image prune -f # 오래된 이미지 정리
